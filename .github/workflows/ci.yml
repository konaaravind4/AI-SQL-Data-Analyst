name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install google-generativeai pandas plotly fastapi httpx pydantic pytest pytest-asyncio python-dotenv
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
